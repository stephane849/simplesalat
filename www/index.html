<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <!--
    width=480: forces 1 CSS-pixel = 1 physical pixel on the Kompakt (480px screen).
    viewport-fit=cover: WebView fills edge-to-edge with no letterbox bars.
  -->
  <meta name="viewport" content="width=480, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#FAF9F5">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Simple Salāt</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      overflow: hidden;
      background: #FAF9F5;
    }
    #app-root { width: 100%; height: 100%; }

    /* APK mode: override the fixed 480×800 so the app fills
       the full physical Kompakt screen (480×800 css-px at DPR=1). */
    .screen.app-screen {
      width: 100vw !important;
      height: 100vh !important;
      border-radius: 0;
    }
  </style>
</head>
<body>
  <div id="app-root"></div>

  <!-- React UMD (downloaded into vendor/ by CI, bundled into the APK) -->
  <script src="vendor/react.min.js"></script>
  <script src="vendor/react-dom.min.js"></script>

  <!-- App scripts compiled from JSX by Babel in CI (load order matters) -->
  <script src="app/data.js"></script>
  <script src="app/ui.js"></script>
  <script src="app/kompakt-frame.js"></script>
  <script src="app/home-variants.js"></script>
  <script src="app/sub-screens.js"></script>
  <script src="app/kompakt-app.js"></script>

  <script>
    ReactDOM.createRoot(document.getElementById('app-root'))
      .render(React.createElement(KompaktApp, { variant: 'c', chrome: false }));
  </script>
</body>
</html>
