<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#FAF9F5">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Simple Salāt</title>
<link rel="stylesheet" href="styles.css">
<style>
  /* ---- App-build chrome: fullscreen stage, no marketing page ---- */
  html, body { height: 100%; background: #000; overflow: hidden; }
  #stage{
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: #000;          /* letterbox on devices wider/taller than 3:5 */
  }
  #device{
    width: 480px; height: 800px;
    transform-origin: center center;
    box-shadow: 0 0 0 1px rgba(0,0,0,.25);
  }
  /* The app screen fills the device box squarely (no bezel, no radius) */
  #device .screen.app-screen{
    width: 480px; height: 800px; border-radius: 0;
  }
  /* On the real Kompakt (exactly 480×800) the stage = the screen, no letterbox shows. */
  @media (display-mode: standalone), (display-mode: fullscreen){
    #stage{ background: var(--paper); }
  }
</style>
</head>
<body>
  <div id="stage">
    <div id="device"><div id="app-root"></div></div>
  </div>

  <!-- React + Babel (pinned) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- App scripts (order matters) -->
  <script type="text/babel" src="app/data.jsx"></script>
  <script type="text/babel" src="app/ui.jsx"></script>
  <script type="text/babel" src="app/kompakt-frame.jsx"></script>
  <script type="text/babel" src="app/home-variants.jsx"></script>
  <script type="text/babel" src="app/sub-screens.jsx"></script>
  <script type="text/babel" src="app/kompakt-app.jsx"></script>

  <script type="text/babel" data-presets="react">
    // Launch straight into the Arc-of-the-Day app, no bezel.
    ReactDOM.createRoot(document.getElementById('app-root'))
      .render(<KompaktApp variant="c" chrome={false} />);

    // Scale the fixed 480×800 screen to fit whatever viewport we're on,
    // preserving aspect ratio (fills the Kompakt's 480×800 exactly = scale 1).
    function fit(){
      const dev = document.getElementById('device');
      const w = window.innerWidth, h = window.innerHeight;
      if(!w || !h){ requestAnimationFrame(fit); return; }   // viewport not ready yet — retry
      const s = Math.min(w / 480, h / 800);
      if(s <= 0){ requestAnimationFrame(fit); return; }
      dev.style.transform = `scale(${s})`;
    }
    window.addEventListener('resize', fit);
    window.addEventListener('orientationchange', fit);
    window.addEventListener('load', fit);
    fit();
  </script>

  <!-- Bundler splash / no-JS fallback -->
  <template id="__bundler_thumbnail">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <rect width="100" height="100" fill="#FAF9F5"/>
      <path d="M30 64 Q50 30 70 64" fill="none" stroke="#17160F" stroke-width="2.4" stroke-linecap="round"/>
      <circle cx="50" cy="47" r="4.4" fill="#17160F"/>
      <line x1="28" y1="64" x2="72" y2="64" stroke="#C7C3B7" stroke-width="1.4" stroke-dasharray="2 4"/>
    </svg>
  </template>
</body>
</html>
