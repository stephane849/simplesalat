              'ICAgICAgIC5zZXRDb250ZW50VHlwZShBdWRpb0F0dHJpYnV0ZXMuQ09OVEVOVF9UWVBFX01VU0lD'
              'KQogICAgICAgICAgICAgICAgLmJ1aWxkKCkpOwogICAgICAgICAgICBwbGF5ZXIuc2V0RGF0YVNv'
              'dXJjZShhZmQuZ2V0RmlsZURlc2NyaXB0b3IoKSwgYWZkLmdldFN0YXJ0T2Zmc2V0KCksIGFmZC5n'
              'ZXRMZW5ndGgoKSk7CiAgICAgICAgICAgIHBsYXllci5wcmVwYXJlKCk7CiAgICAgICAgICAgIHBs'
              'YXllci5zdGFydCgpOwogICAgICAgICAgICBwbGF5ZXIuc2V0T25Db21wbGV0aW9uTGlzdGVuZXIo'
              'bXAgLT4gewogICAgICAgICAgICAgICAgc3RvcFBsYXllcigpOwogICAgICAgICAgICAgICAgbm90.'
              'aWZ5TGlzdGVuZXJzKCJwbGF5YmFja0NvbXBsZXRlIiwgbmV3IEpTT2JqZWN0KCkpOwogICAgICAg'
              'ICAgICB9KTsKICAgICAgICAgICAgY2FsbC5yZXNvbHZlKCk7CiAgICAgICAgfSBjYXRjaCAoRXhj'
              'ZXB0aW9uIGUpIHsgY2FsbC5yZWplY3QoZS5nZXRNZXNzYWdlKCkpOyB9CiAgICB9CgogICAgQFBs'
              'dWdpbk1ldGhvZAogICAgcHVibGljIHZvaWQgc3RvcChQbHVnaW5DYWxsIGNhbGwpIHsgc3RvcFBs'
              'YXllcigpOyBjYWxsLnJlc29sdmUoKTsgfQoKICAgIHByaXZhdGUgdm9pZCBzdG9wUGxheWVyKCkg'
              'ewogICAgICAgIGlmIChwbGF5ZXIgIT0gbnVsbCkgewogICAgICAgICAgICB0cnkgeyBwbGF5ZXIu'
              'c3RvcCgpOyB9IGNhdGNoIChFeGNlcHRpb24gaWdub3JlZCkge30KICAgICAgICAgICAgcGxheWVy'
              'LnJlbGVhc2UoKTsKICAgICAgICAgICAgcGxheWVyID0gbnVsbDsKICAgICAgICB9CiAgICB9Cn0K'
          )
          path = 'android/app/src/main/java/com/simplesalat/app/SalatAudioPlugin.java'
          with open(path, 'w') as f:
              f.write(base64.b64decode(java_b64).decode())
          print('SalatAudioPlugin.java created')
          EOF

      - name: Lock to portrait orientation
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          sed -i 's/android:screenOrientation="unspecified"/android:screenOrientation="portrait"/' "$MANIFEST"
          grep -q 'screenOrientation' "$MANIFEST" || \
            sed -i 's/android:hardwareAccelerated="true"/android:hardwareAccelerated="true"\n            android:screenOrientation="portrait"/' "$MANIFEST"

      - name: Add location permission
        run: |
          python3 - <<'EOF'
          path = 'android/app/src/main/AndroidManifest.xml'
          with open(path) as f:
              content = f.read()
          if 'ACCESS_FINE_LOCATION' not in content:
              content = content.replace(
                  '<uses-permission android:name="android.permission.INTERNET" />',
                  '<uses-permission android:name="android.permission.INTERNET" />\n    '
                  '<uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />\n    '
                  '<uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />'
              )
          with open(path, 'w') as f:
              f.write(content)
          print('Location permissions added to AndroidManifest.xml')
          EOF

      - name: Enable WebView media playback
        run: |
          python3 - <<'EOF'
          import re
          path = 'android/app/src/main/java/com/simplesalat/app/MainActivity.java'
          with open(path) as f:
              content = f.read()
          content = content.replace(
              'import com.getcapacitor.BridgeActivity;',
              'import android.webkit.WebSettings;\nimport com.getcapacitor.BridgeActivity;'
          )
          content = re.sub(
              r'public class MainActivity extends BridgeActivity \{\s*\}',
              'public class MainActivity extends BridgeActivity {\n'
              '    @Override\n'
              '    protected void onCreate(android.os.Bundle savedInstanceState) {\n'
              '        registerPlugin(SalatAudioPlugin.class);\n'
              '        registerPlugin(AdhanSchedulerPlugin.class);\n'
              '        super.onCreate(savedInstanceState);\n'
              '        WebSettings ws = this.bridge.getWebView().getSettings();\n'
              '        ws.setMediaPlaybackRequiresUserGesture(false);\n'
              '    }\n'
              '}',
              content
          )
          with open(path, 'w') as f:
              f.write(content)
          print('MainActivity patched: plugins registered + media playback unrestricted')
          EOF

      - name: Create alarm scheduler components
        run: |
          python3 - <<'EOF'
          import os
          base = 'android/app/src/main/java/com/simplesalat/app'
          with open(os.path.join(base, 'AdhanReceiver.java'), 'w') as f:
              f.write("""package com.simplesalat.app;
          import android.content.BroadcastReceiver;
          import android.content.Context;
          import android.content.Intent;
          import android.os.Build;

          public class AdhanReceiver extends BroadcastReceiver {
              @Override
              public void onReceive(Context context, Intent intent) {
                  String sound = intent.getStringExtra("sound");
                  Intent svc = new Intent(context, AdhanService.class);
                  svc.putExtra("sound", sound != null ? sound : "makkah");
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                      context.startForegroundService(svc);
                  } else {
                      context.startService(svc);
                  }
              }
          }
          """)
          with open(os.path.join(base, 'AdhanService.java'), 'w') as f:
              f.write("""package com.simplesalat.app;
          import android.app.NotificationChannel;
          import android.app.NotificationManager;
          import android.app.Service;
          import android.content.Intent;
          import android.content.res.AssetFileDescriptor;
          import android.media.AudioAttributes;
          import android.media.MediaPlayer;
          import android.os.Build;
          import android.os.IBinder;
          import androidx.core.app.NotificationCompat;

          public class AdhanService extends Service {
              private static final String CHANNEL = "adhan";
              private MediaPlayer mp;

              @Override
              public int onStartCommand(Intent intent, int flags, int startId) {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                      NotificationChannel ch = new NotificationChannel(
                          CHANNEL, "Adhan", NotificationManager.IMPORTANCE_HIGH);
                      getSystemService(NotificationManager.class).createNotificationChannel(ch);
                  }
                  NotificationCompat.Builder b = new NotificationCompat.Builder(this, CHANNEL)
                      .setContentTitle("Prayer Time")
                      .setContentText("Adhan")
                      .setSmallIcon(android.R.drawable.ic_lock_idle_alarm)
                      .setPriority(NotificationCompat.PRIORITY_HIGH);
                  startForeground(42, b.build());
                  String sound = intent != null && intent.getStringExtra("sound") != null
                      ? intent.getStringExtra("sound") : "makkah";
                  play(sound);
                  return START_NOT_STICKY;
              }

              private void play(String sound) {
                  try {
                      AssetFileDescriptor afd = getAssets().openFd("public/audio/adhan-" + sound + ".mp3");
                      mp = new MediaPlayer();
                      mp.setAudioAttributes(new AudioAttributes.Builder()
                          .setUsage(AudioAttributes.USAGE_ALARM)
                          .setContentType(AudioAttributes.CONTENT_TYPE_MUSIC)
                          .build());
                      mp.setDataSource(afd.getFileDescriptor(), afd.getStartOffset(), afd.getLength());
                      mp.prepare();
                      mp.start();
                      mp.setOnCompletionListener(p -> stopSelf());
                  } catch (Exception e) { stopSelf(); }
              }

              @Override
              public void onDestroy() {
                  if (mp != null) {
                      try { mp.stop(); } catch (Exception ignored) {}
                      mp.release(); mp = null;
                  }
              }

              @Override public IBinder onBind(Intent i) { return null; }
          }
          """)
          with open(os.path.join(base, 'AdhanSchedulerPlugin.java'), 'w') as f:
              f.write("""package com.simplesalat.app;
          import android.app.AlarmManager;
          import android.app.PendingIntent;
          import android.content.Context;
          import android.content.Intent;
          import android.os.Build;
          import com.getcapacitor.Plugin;
          import com.getcapacitor.PluginCall;
          import com.getcapacitor.PluginMethod;
          import com.getcapacitor.annotation.CapacitorPlugin;

          @CapacitorPlugin(name = "AdhanScheduler")
          public class AdhanSchedulerPlugin extends Plugin {

              @PluginMethod
              public void schedule(PluginCall call) {
                  long ms = call.getLong("triggerMs", 0L);
                  String sound = call.getString("sound", "makkah");
                  int id = call.getInt("id", 0);
                  AlarmManager am = (AlarmManager) getContext().getSystemService(Context.ALARM_SERVICE);
                  PendingIntent pi = makePi(id, sound);
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.S && !am.canScheduleExactAlarms()) {
                      am.set(AlarmManager.RTC_WAKEUP, ms, pi);
                  } else {
                      am.setExactAndAllowWhileIdle(AlarmManager.RTC_WAKEUP, ms, pi);
                  }
                  call.resolve();
              }

              @PluginMethod
              public void cancel(PluginCall call) {
                  int id = call.getInt("id", 0);
                  AlarmManager am = (AlarmManager) getContext().getSystemService(Context.ALARM_SERVICE);
                  am.cancel(makePi(id, ""));
                  call.resolve();
              }

              private PendingIntent makePi(int id, String sound) {
                  Intent i = new Intent(getContext(), AdhanReceiver.class);
                  i.putExtra("sound", sound);
                  int flags = PendingIntent.FLAG_UPDATE_CURRENT
                      | (Build.VERSION.SDK_INT >= Build.VERSION_CODES.M ? PendingIntent.FLAG_IMMUTABLE : 0);
                  return PendingIntent.getBroadcast(getContext(), id, i, flags);
              }
          }
          """)
          print('AdhanReceiver, AdhanService, AdhanSchedulerPlugin created')
          EOF

      - name: Add alarm permissions and components
        run: |
          python3 - <<'EOF'
          path = 'android/app/src/main/AndroidManifest.xml'
          with open(path) as f:
              content = f.read()
          if 'SCHEDULE_EXACT_ALARM' not in content:
              perms = (
                  '\n    <uses-permission android:name="android.permission.SCHEDULE_EXACT_ALARM" />'
                  '\n    <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED" />'
                  '\n    <uses-permission android:name="android.permission.WAKE_LOCK" />'
                  '\n    <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />'
                  '\n    <uses-permission android:name="android.permission.FOREGROUND_SERVICE_MEDIA_PLAYBACK" />'
              )
              content = content.replace('</manifest>', perms + '\n</manifest>')
          if 'AdhanReceiver' not in content:
              components = (
                  '\n        <receiver android:name=".AdhanReceiver" android:exported="false" />'
                  '\n        <service android:name=".AdhanService" android:exported="false"'
                  '\n            android:foregroundServiceType="mediaPlayback" />'
              )
              content = content.replace('</application>', components + '\n    </application>')
          with open(path, 'w') as f:
              f.write(content)
          print('Alarm permissions and components added')
          EOF

      - name: Configure full-screen E-Ink display
        run: |
          python3 - <<'EOF'
          path = 'android/app/src/main/res/values/styles.xml'
          with open(path) as f:
              content = f.read()
          insert = (
              '\n        <item name="android:windowFullscreen">true</item>'
              '\n        <item name="android:windowTranslucentNavigation">true</item>'
          )
          target = '<item name="colorAccent">@color/colorAccent</item>'
          if target in content and 'windowFullscreen' not in content:
              content = content.replace(target, target + insert)
          with open(path, 'w') as f:
              f.write(content)
          print('styles.xml patched for full-screen E-Ink display')
          EOF

      - name: Set app icon (crescent moon)
        run: |
          pip3 install Pillow --quiet
          python3 - <<'EOF'
          from PIL import Image
          import os
          src = 'resources/moonicon.png'
          configs = [
              (48,  'mipmap-mdpi'),
              (72,  'mipmap-hdpi'),
              (96,  'mipmap-xhdpi'),
              (144, 'mipmap-xxhdpi'),
              (192, 'mipmap-xxxhdpi'),
          ]
          base = 'android/app/src/main/res'
          img = Image.open(src).convert('RGBA')
          for size, d in configs:
              # 35% fill — 32.5% transparent padding each side
              icon_px = int(size * 0.35)
              icon = img.resize((icon_px, icon_px), Image.LANCZOS)
              canvas = Image.new('RGBA', (size, size), (0, 0, 0, 0))
              off = (size - icon_px) // 2
              canvas.paste(icon, (off, off), icon)
              for name in ['ic_launcher.png', 'ic_launcher_round.png', 'ic_launcher_foreground.png']:
                  canvas.save(os.path.join(base, d, name))
          print('App icons generated at all densities')
          EOF

      - name: Sync Capacitor web assets
        run: npx cap sync android

      # ── Gradle build ──────────────────────────────────────────────────────
      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: |
          mv android/app/build/outputs/apk/debug/app-debug.apk \
             android/app/build/outputs/apk/debug/salātapp.apk

      # ── Artifacts & release ───────────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: salat-apk
          path: android/app/build/outputs/apk/debug/salātapp.apk
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Salāt — Build ${{ github.run_number }}"
          body: |
            Debug APK built from commit `${{ github.sha }}`.

            ## Install on Mudita Kompakt
            1. Download **salātapp.apk** below.
            2. Enable **Install from unknown sources** on the device.
            3. Install via the file manager — or with `adb install salātapp.apk`.

            ## Features
            - **Arc of the Day** home — sun-path arc; tap any prayer name to see its time
            - **Hijri calendar** with ±2 day offset for local moon-sighting
            - **Adhan** — bundled Makkah and Madinah MP3 recordings with in-app preview
            - **Settings**: ISNA / MWL / Egyptian / Umm al-Qurā / Karachi / Moonsighting Committee
            - Standard / Ḥanafī Asr · 12h / 24h clock
          files: android/app/build/outputs/apk/debug/salātapp.apk
          make_latest: true
