name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── Source ────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Toolchain ─────────────────────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── Node deps ─────────────────────────────────────────────────────────
      - name: Install npm dependencies
        run: npm install

      # ── Web build ─────────────────────────────────────────────────────────
      - name: Compile JSX → JS
        run: npm run compile-jsx

      - name: Download React vendor scripts
        run: |
          mkdir -p www/vendor
          curl -fsSL -o www/vendor/react.min.js \
            https://unpkg.com/react@18.3.1/umd/react.production.min.js
          curl -fsSL -o www/vendor/react-dom.min.js \
            https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js

      # ── Android platform ─────────────────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Accept Android SDK licences
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true

      - name: Add Capacitor Android platform
        run: npx cap add android

      - name: Create SalatAudio native plugin
        run: |
          python3 - <<'EOF'
          path = 'android/app/src/main/java/com/simplesalat/app/SalatAudioPlugin.java'
          with open(path, 'w') as f:
              f.write("""package com.simplesalat.app;
          import android.content.res.AssetFileDescriptor;
          import android.media.AudioAttributes;
          import android.media.MediaPlayer;
          import com.getcapacitor.JSObject;
          import com.getcapacitor.Plugin;
          import com.getcapacitor.PluginCall;
          import com.getcapacitor.PluginMethod;
          import com.getcapacitor.annotation.CapacitorPlugin;

          @CapacitorPlugin(name = "SalatAudio")
          public class SalatAudioPlugin extends Plugin {
              private MediaPlayer player;

              @PluginMethod
              public void play(PluginCall call) {
                  String sound = call.getString("sound", "makkah");
                  float vol = (float) Math.max(0.0, Math.min(1.0, call.getDouble("volume", 1.0)));
                  stopPlayer();
                  try {
                      AssetFileDescriptor afd = getContext().getAssets()
                          .openFd("public/audio/adhan-" + sound + ".mp3");
                      player = new MediaPlayer();
                      player.setAudioAttributes(new AudioAttributes.Builder()
                          .setUsage(AudioAttributes.USAGE_ALARM)
                          .setContentType(AudioAttributes.CONTENT_TYPE_MUSIC)
                          .build());
                      player.setDataSource(afd.getFileDescriptor(), afd.getStartOffset(), afd.getLength());
                      player.prepare();
                      player.setVolume(vol, vol);
                      player.start();
                      player.setOnCompletionListener(mp -> {
                          stopPlayer();
                          notifyListeners("playbackComplete", new JSObject());
                      });
                      call.resolve();
                  } catch (Exception e) { call.reject(e.getMessage()); }
              }

              @PluginMethod
              public void stop(PluginCall call) { stopPlayer(); call.resolve(); }

              private void stopPlayer() {
                  if (player != null) {
                      try { player.stop(); } catch (Exception ignored) {}
                      player.release();
                      player = null;
                  }
              }
          }
          """)
          print('SalatAudioPlugin.java created')
          EOF

      - name: Lock to portrait orientation
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          sed -i 's/android:screenOrientation="unspecified"/android:screenOrientation="portrait"/' "$MANIFEST"
          grep -q 'screenOrientation' "$MANIFEST" || \
            sed -i 's/android:hardwareAccelerated="true"/android:hardwareAccelerated="true"\n            android:screenOrientation="portrait"/' "$MANIFEST"

      - name: Add location permission
        run: |
          python3 - <<'EOF'
          path = 'android/app/src/main/AndroidManifest.xml'
          with open(path) as f:
              content = f.read()
          if 'ACCESS_FINE_LOCATION' not in content:
              content = content.replace(
                  '<uses-permission android:name="android.permission.INTERNET" />',
                  '<uses-permission android:name="android.permission.INTERNET" />\n    '
                  '<uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />\n    '
                  '<uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />'
              )
          with open(path, 'w') as f:
              f.write(content)
          print('Location permissions added to AndroidManifest.xml')
          EOF

      - name: Enable WebView media playback
        run: |
          python3 - <<'EOF'
          import re
          path = 'android/app/src/main/java/com/simplesalat/app/MainActivity.java'
          with open(path) as f:
              content = f.read()
          content = content.replace(
              'import com.getcapacitor.BridgeActivity;',
              'import android.content.Intent;\nimport android.webkit.WebSettings;\nimport com.getcapacitor.BridgeActivity;'
          )
          content = re.sub(
              r'public class MainActivity extends BridgeActivity \{\s*\}',
              'public class MainActivity extends BridgeActivity {\n'
              '    @Override\n'
              '    protected void onCreate(android.os.Bundle savedInstanceState) {\n'
              '        registerPlugin(SalatAudioPlugin.class);\n'
              '        registerPlugin(AdhanSchedulerPlugin.class);\n'
              '        super.onCreate(savedInstanceState);\n'
              '        WebSettings ws = this.bridge.getWebView().getSettings();\n'
              '        ws.setMediaPlaybackRequiresUserGesture(false);\n'
              '    }\n'
              '\n'
              '    @Override\n'
              '    public boolean dispatchKeyEvent(android.view.KeyEvent event) {\n'
              '        if (event.getAction() == android.view.KeyEvent.ACTION_DOWN\n'
              '                && AdhanService.isRunning) {\n'
              '            stopService(new Intent(this, AdhanService.class));\n'
              '            return true;\n'
              '        }\n'
              '        return super.dispatchKeyEvent(event);\n'
              '    }\n'
              '}',
              content
          )
          with open(path, 'w') as f:
              f.write(content)
          print('MainActivity patched: plugins registered + media playback unrestricted')
          EOF

      - name: Add adhan lock-screen support
        run: |
          python3 - <<'EOF'
          path = 'android/app/src/main/java/com/simplesalat/app/MainActivity.java'
          with open(path) as f:
              content = f.read()
          if 'android.os.Build' not in content:
              content = content.replace(
                  'import android.content.Intent;',
                  'import android.content.Intent;\nimport android.os.Build;\nimport android.view.WindowManager;'
              )
          if 'handleAdhanIntent' not in content:
              content = content.replace(
                  '    @Override\n    public boolean dispatchKeyEvent',
                  '    @Override\n'
                  '    protected void onNewIntent(android.content.Intent intent) {\n'
                  '        super.onNewIntent(intent);\n'
                  '        setIntent(intent);\n'
                  '        handleAdhanIntent(intent);\n'
                  '    }\n\n'
                  '    private void handleAdhanIntent(android.content.Intent intent) {\n'
                  '        if (intent != null && intent.getBooleanExtra("adhan_playing", false)) {\n'
                  '            if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O_MR1) {\n'
                  '                setShowWhenLocked(true);\n'
                  '                setTurnScreenOn(true);\n'
                  '            } else {\n'
                  '                getWindow().addFlags(\n'
                  '                    WindowManager.LayoutParams.FLAG_SHOW_WHEN_LOCKED |\n'
                  '                    WindowManager.LayoutParams.FLAG_TURN_SCREEN_ON |\n'
                  '                    WindowManager.LayoutParams.FLAG_DISMISS_KEYGUARD);\n'
                  '            }\n'
                  '        }\n'
                  '    }\n\n'
                  '    @Override\n    public boolean dispatchKeyEvent'
              )
              content = content.replace(
                  '        ws.setMediaPlaybackRequiresUserGesture(false);\n    }',
                  '        ws.setMediaPlaybackRequiresUserGesture(false);\n'
                  '        handleAdhanIntent(getIntent());\n    }'
              )
          with open(path, 'w') as f:
              f.write(content)
          print('MainActivity: lock-screen + wake-screen support added')
          EOF

      - name: Create alarm scheduler components
        run: |
          python3 - <<'EOF'
          import os
          base = 'android/app/src/main/java/com/simplesalat/app'
          with open(os.path.join(base, 'AdhanReceiver.java'), 'w') as f:
              f.write("""package com.simplesalat.app;
          import android.app.AlarmManager;
          import android.app.PendingIntent;
          import android.content.BroadcastReceiver;
          import android.content.Context;
          import android.content.Intent;
          import android.os.Build;

          public class AdhanReceiver extends BroadcastReceiver {
              @Override
              public void onReceive(Context context, Intent intent) {
                  String sound = intent.getStringExtra("sound");
                  float vol = intent.getFloatExtra("volume", 1.0f);
                  int id = intent.getIntExtra("id", -1);
                  long triggerMs = intent.getLongExtra("triggerMs", 0L);
                  Intent svc = new Intent(context, AdhanService.class);
                  svc.putExtra("sound", sound != null ? sound : "makkah");
                  svc.putExtra("volume", vol);
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                      context.startForegroundService(svc);
                  } else {
                      context.startService(svc);
                  }
                  if (id >= 0 && triggerMs > 0) {
                      long nextMs = triggerMs + 86400000L;
                      Intent next = new Intent(context, AdhanReceiver.class);
                      next.putExtra("sound", sound != null ? sound : "makkah");
                      next.putExtra("volume", vol);
                      next.putExtra("id", id);
                      next.putExtra("triggerMs", nextMs);
                      int flags = PendingIntent.FLAG_UPDATE_CURRENT
                          | (Build.VERSION.SDK_INT >= Build.VERSION_CODES.M ? PendingIntent.FLAG_IMMUTABLE : 0);
                      PendingIntent pi = PendingIntent.getBroadcast(context, id, next, flags);
                      AlarmManager am = (AlarmManager) context.getSystemService(Context.ALARM_SERVICE);
                      if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.S && !am.canScheduleExactAlarms()) {
                          am.set(AlarmManager.RTC_WAKEUP, nextMs, pi);
                      } else {
                          am.setExactAndAllowWhileIdle(AlarmManager.RTC_WAKEUP, nextMs, pi);
                      }
                  }
              }
          }
          """)
          with open(os.path.join(base, 'AdhanService.java'), 'w') as f:
              f.write("""package com.simplesalat.app;
          import android.app.NotificationChannel;
          import android.app.NotificationManager;
          import android.app.PendingIntent;
          import android.app.Service;
          import android.content.Intent;
          import android.content.res.AssetFileDescriptor;
          import android.media.AudioAttributes;
          import android.media.MediaPlayer;
          import android.os.Build;
          import android.os.IBinder;
          import android.os.PowerManager;
          import androidx.core.app.NotificationCompat;

          public class AdhanService extends Service {
              private static final String CHANNEL = "adhan";
              public static volatile boolean isRunning = false;
              private MediaPlayer mp;
              private PowerManager.WakeLock wakeLock;

              @Override
              public int onStartCommand(Intent intent, int flags, int startId) {
                  if (intent != null && "STOP".equals(intent.getAction())) {
                      stopSelf();
                      return START_NOT_STICKY;
                  }
                  isRunning = true;
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                      NotificationChannel ch = new NotificationChannel(
                          CHANNEL, "Adhan", NotificationManager.IMPORTANCE_HIGH);
                      getSystemService(NotificationManager.class).createNotificationChannel(ch);
                  }
                  Intent stopIntent = new Intent(this, AdhanService.class);
                  stopIntent.setAction("STOP");
                  int piFlags = PendingIntent.FLAG_UPDATE_CURRENT
                      | (Build.VERSION.SDK_INT >= Build.VERSION_CODES.M ? PendingIntent.FLAG_IMMUTABLE : 0);
                  PendingIntent stopPi = PendingIntent.getService(this, 0, stopIntent, piFlags);
                  Intent launchIntent = new Intent(this, MainActivity.class);
                  launchIntent.addFlags(Intent.FLAG_ACTIVITY_NEW_TASK | Intent.FLAG_ACTIVITY_SINGLE_TOP);
                  launchIntent.putExtra("adhan_playing", true);
                  PendingIntent launchPi = PendingIntent.getActivity(this, 1, launchIntent, piFlags);
                  NotificationCompat.Builder b = new NotificationCompat.Builder(this, CHANNEL)
                      .setContentTitle("Prayer Time")
                      .setContentText("Adhan is playing")
                      .setSmallIcon(android.R.drawable.ic_lock_idle_alarm)
                      .setPriority(NotificationCompat.PRIORITY_HIGH)
                      .setFullScreenIntent(launchPi, true)
                      .setContentIntent(launchPi)
                      .addAction(android.R.drawable.ic_media_pause, "Stop", stopPi);
                  startForeground(42, b.build());
                  PowerManager pm = (PowerManager) getSystemService(POWER_SERVICE);
                  wakeLock = pm.newWakeLock(
                      PowerManager.FULL_WAKE_LOCK | PowerManager.ACQUIRE_CAUSES_WAKEUP,
                      "simplesalat:adhan");
                  wakeLock.acquire(300000L);
                  String sound = intent != null && intent.getStringExtra("sound") != null
                      ? intent.getStringExtra("sound") : "makkah";
                  float vol = intent != null ? intent.getFloatExtra("volume", 1.0f) : 1.0f;
                  play(sound, vol);
                  return START_NOT_STICKY;
              }

              private void play(String sound, float vol) {
                  try {
                      AssetFileDescriptor afd = getAssets().openFd("public/audio/adhan-" + sound + ".mp3");
                      mp = new MediaPlayer();
                      mp.setAudioAttributes(new AudioAttributes.Builder()
                          .setUsage(AudioAttributes.USAGE_ALARM)
                          .setContentType(AudioAttributes.CONTENT_TYPE_MUSIC)
                          .build());
                      mp.setDataSource(afd.getFileDescriptor(), afd.getStartOffset(), afd.getLength());
                      mp.prepare();
                      mp.setVolume(vol, vol);
                      mp.start();
                      mp.setOnCompletionListener(p -> stopSelf());
                  } catch (Exception e) { stopSelf(); }
              }

              @Override
              public void onDestroy() {
                  isRunning = false;
                  if (wakeLock != null && wakeLock.isHeld()) { wakeLock.release(); wakeLock = null; }
                  if (mp != null) {
                      try { mp.stop(); } catch (Exception ignored) {}
                      mp.release(); mp = null;
                  }
              }

              @Override public IBinder onBind(Intent i) { return null; }
          }
          """)
          with open(os.path.join(base, 'AdhanSchedulerPlugin.java'), 'w') as f:
              f.write("""package com.simplesalat.app;
          import android.app.AlarmManager;
          import android.app.PendingIntent;
          import android.content.Context;
          import android.content.Intent;
          import android.os.Build;
          import com.getcapacitor.Plugin;
          import com.getcapacitor.PluginCall;
          import com.getcapacitor.JSObject;
          import com.getcapacitor.PluginMethod;
          import com.getcapacitor.annotation.CapacitorPlugin;

          @CapacitorPlugin(name = "AdhanScheduler")
          public class AdhanSchedulerPlugin extends Plugin {

              @PluginMethod
              public void schedule(PluginCall call) {
                  long ms = call.getLong("triggerMs", 0L);
                  String sound = call.getString("sound", "makkah");
                  int id = call.getInt("id", 0);
                  float vol = (float) Math.max(0.0, Math.min(1.0, call.getDouble("volume", 1.0)));
                  AlarmManager am = (AlarmManager) getContext().getSystemService(Context.ALARM_SERVICE);
                  PendingIntent pi = makePi(id, sound, vol, ms);
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.S && !am.canScheduleExactAlarms()) {
                      am.set(AlarmManager.RTC_WAKEUP, ms, pi);
                  } else {
                      am.setExactAndAllowWhileIdle(AlarmManager.RTC_WAKEUP, ms, pi);
                  }
                  call.resolve();
              }

              @PluginMethod
              public void cancel(PluginCall call) {
                  int id = call.getInt("id", 0);
                  AlarmManager am = (AlarmManager) getContext().getSystemService(Context.ALARM_SERVICE);
                  am.cancel(makePi(id, "", 0f, 0L));
                  call.resolve();
              }

              @PluginMethod
              public void stopAdhan(PluginCall call) {
                  Intent i = new Intent(getContext(), AdhanService.class);
                  i.setAction("STOP");
                  getContext().stopService(i);
                  call.resolve();
              }

              @PluginMethod
              public void isAdhanPlaying(PluginCall call) {
                  JSObject result = new JSObject();
                  result.put("playing", AdhanService.isRunning);
                  call.resolve(result);
              }

              private PendingIntent makePi(int id, String sound, float vol, long triggerMs) {
                  Intent i = new Intent(getContext(), AdhanReceiver.class);
                  i.putExtra("sound", sound);
                  i.putExtra("volume", vol);
                  i.putExtra("id", id);
                  i.putExtra("triggerMs", triggerMs);
                  int flags = PendingIntent.FLAG_UPDATE_CURRENT
                      | (Build.VERSION.SDK_INT >= Build.VERSION_CODES.M ? PendingIntent.FLAG_IMMUTABLE : 0);
                  return PendingIntent.getBroadcast(getContext(), id, i, flags);
              }
          }
          """)
          print('AdhanReceiver, AdhanService, AdhanSchedulerPlugin created')
          EOF

      - name: Add alarm permissions and components
        run: |
          python3 - <<'EOF'
          path = 'android/app/src/main/AndroidManifest.xml'
          with open(path) as f:
              content = f.read()
          if 'SCHEDULE_EXACT_ALARM' not in content:
              perms = (
                  '\n    <uses-permission android:name="android.permission.SCHEDULE_EXACT_ALARM" />'
                  '\n    <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED" />'
                  '\n    <uses-permission android:name="android.permission.WAKE_LOCK" />'
                  '\n    <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />'
                  '\n    <uses-permission android:name="android.permission.FOREGROUND_SERVICE_MEDIA_PLAYBACK" />'
                  '\n    <uses-permission android:name="android.permission.USE_FULL_SCREEN_INTENT" />'
              )
              content = content.replace('</manifest>', perms + '\n</manifest>')
          if 'AdhanReceiver' not in content:
              components = (
                  '\n        <receiver android:name=".AdhanReceiver" android:exported="false" />'
                  '\n        <service android:name=".AdhanService" android:exported="false"'
                  '\n            android:foregroundServiceType="mediaPlayback" />'
              )
              content = content.replace('</application>', components + '\n    </application>')
          with open(path, 'w') as f:
              f.write(content)
          print('Alarm permissions and components added')
          EOF

      - name: Configure full-screen E-Ink display
        run: |
          python3 - <<'EOF'
          path = 'android/app/src/main/res/values/styles.xml'
          with open(path) as f:
              content = f.read()
          insert = (
              '\n        <item name="android:windowFullscreen">true</item>'
              '\n        <item name="android:windowTranslucentNavigation">true</item>'
          )
          target = '<item name="colorAccent">@color/colorAccent</item>'
          if target in content and 'windowFullscreen' not in content:
              content = content.replace(target, target + insert)
          with open(path, 'w') as f:
              f.write(content)
          print('styles.xml patched for full-screen E-Ink display')
          EOF

      - name: Set app icon (crescent moon)
        run: |
          pip3 install Pillow --quiet
          python3 - <<'EOF'
          from PIL import Image
          import os
          src = 'resources/moonicon.png'
          configs = [
              (48,  'mipmap-mdpi'),
              (72,  'mipmap-hdpi'),
              (96,  'mipmap-xhdpi'),
              (144, 'mipmap-xxhdpi'),
              (192, 'mipmap-xxxhdpi'),
          ]
          base = 'android/app/src/main/res'
          img = Image.open(src).convert('RGBA')
          for size, d in configs:
              # 35% fill — 32.5% transparent padding each side
              icon_px = int(size * 0.35)
              icon = img.resize((icon_px, icon_px), Image.LANCZOS)
              canvas = Image.new('RGBA', (size, size), (0, 0, 0, 0))
              off = (size - icon_px) // 2
              canvas.paste(icon, (off, off), icon)
              for name in ['ic_launcher.png', 'ic_launcher_round.png', 'ic_launcher_foreground.png']:
                  canvas.save(os.path.join(base, d, name))
          print('App icons generated at all densities')
          EOF

      - name: Sync Capacitor web assets
        run: npx cap sync android

      # ── Gradle build ──────────────────────────────────────────────────────
      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: |
          mv android/app/build/outputs/apk/debug/app-debug.apk \
             android/app/build/outputs/apk/debug/salātapp.apk

      # ── Artifacts & release ───────────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: salat-apk
          path: android/app/build/outputs/apk/debug/salātapp.apk
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Salāt — Build ${{ github.run_number }}"
          body: |
            APK built from commit `${{ github.sha }}`.

            ## Install on Mudita Kompakt
            1. Download **salātapp.apk** below.
            2. Enable **Install from unknown sources** on the device.
            3. Install via the file manager — or with `adb install salātapp.apk`.

            ## Features
            - **Arc of the Day** — sun-path arc from Fajr to Isha; tap any prayer to see its time and countdown
            - **Background alarms** — adhan plays at prayer time even when the phone is locked; screen wakes automatically
            - **Three adhans** — Makkah, Madīnah, Sudan — with adjustable volume and in-app preview
            - **Hijri calendar** with ±2 day offset for local moon-sighting
            - **Six calculation methods**: ISNA / MWL / Egyptian / Umm al-Qurā / Karachi / Moonsighting Committee
            - Standard / Ḥanafī Asr · 12h / 24h clock · GPS location
          files: android/app/build/outputs/apk/debug/salātapp.apk
          make_latest: true
