name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── Source ────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Toolchain ─────────────────────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── Node deps ─────────────────────────────────────────────────────────
      - name: Install npm dependencies
        run: npm install

      # ── Web build ─────────────────────────────────────────────────────────
      - name: Compile JSX → JS
        run: npm run compile-jsx

      - name: Download React vendor scripts
        run: |
          mkdir -p www/vendor
          curl -fsSL -o www/vendor/react.min.js \
            https://unpkg.com/react@18.3.1/umd/react.production.min.js
          curl -fsSL -o www/vendor/react-dom.min.js \
            https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js

      # ── Android platform ─────────────────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Accept Android SDK licences
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true

      - name: Add Capacitor Android platform
        run: npx cap add android

      - name: Lock to portrait orientation
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          # Capacitor sets "unspecified" by default; flip it to portrait.
          sed -i 's/android:screenOrientation="unspecified"/android:screenOrientation="portrait"/' "$MANIFEST"
          # Safety: if the attribute was absent, insert it next to hardwareAccelerated.
          grep -q 'screenOrientation' "$MANIFEST" || \
            sed -i 's/android:hardwareAccelerated="true"/android:hardwareAccelerated="true"\n            android:screenOrientation="portrait"/' "$MANIFEST"

      - name: Configure full-screen E-Ink display
        run: |
          # Hide the Android system status bar so the app's own status bar
          # fills the complete 480×800 E-Ink canvas edge-to-edge.
          python3 - <<'EOF'
          path = 'android/app/src/main/res/values/styles.xml'
          with open(path) as f:
              content = f.read()
          insert = (
              '\n        <item name="android:windowFullscreen">true</item>'
              '\n        <item name="android:windowTranslucentNavigation">true</item>'
          )
          target = '<item name="colorAccent">@color/colorAccent</item>'
          if target in content and 'windowFullscreen' not in content:
              content = content.replace(target, target + insert)
          with open(path, 'w') as f:
              f.write(content)
          print('styles.xml patched for full-screen E-Ink display')
          EOF

      - name: Sync Capacitor web assets
        run: npx cap sync android

      # ── Gradle build ──────────────────────────────────────────────────────
      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      # ── Artifacts & release ───────────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: simple-salat-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Simple Salat — Build ${{ github.run_number }}"
          body: |
            Debug APK built from commit `${{ github.sha }}`.

            ## Install on Mudita Kompakt
            1. Download **app-debug.apk** below.
            2. Enable **Install from unknown sources** on the device.
            3. Install via the file manager — or with `adb install app-debug.apk`.

            ## Features
            - **Arc of the Day** home — sun-path arc; tap any prayer name to see its time
            - **Hijri calendar** with ±2 day offset for local moon-sighting
            - **Qibla** direction (Ottawa → Makkah, 57° NE)
            - **Settings**: ISNA / MWL / Egyptian / Umm al-Qurā / Karachi / Moonsighting Committee
            - **Custom adhan upload** (MP3, WAV, OGG) with in-app preview
            - Standard / Ḥanafī Asr · 12h / 24h clock
          files: android/app/build/outputs/apk/debug/app-debug.apk
          make_latest: true
