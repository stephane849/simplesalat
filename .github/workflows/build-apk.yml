name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── Source ────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Toolchain ─────────────────────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── Node deps ─────────────────────────────────────────────────────────
      - name: Install npm dependencies
        run: npm install

      # ── Web build ─────────────────────────────────────────────────────────
      - name: Compile JSX → JS
        run: npm run compile-jsx

      - name: Download React vendor scripts
        run: |
          mkdir -p www/vendor
          curl -fsSL -o www/vendor/react.min.js \
            https://unpkg.com/react@18.3.1/umd/react.production.min.js
          curl -fsSL -o www/vendor/react-dom.min.js \
            https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js

      # ── Android platform ─────────────────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Accept Android SDK licences
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true

      - name: Add Capacitor Android platform
        run: npx cap add android

      - name: Create SalatAudio native plugin
